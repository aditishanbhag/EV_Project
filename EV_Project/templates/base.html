<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}EV ChargePro{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --void:#020408; --deep:#060d14; --panel:rgba(6,18,32,0.88); --panel2:rgba(10,26,46,0.6);
  --border:rgba(0,212,255,0.12); --border-h:rgba(0,212,255,0.4);
  --plasma:#00d4ff; --volt:#39ff6e; --ember:#ff6b1a; --danger:#ff2d55; --gold:#ffd700;
  --text:#e8f4fd; --text-dim:#7ab3cc; --text-ghost:#3a6b82; --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--void);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 15% 20%,rgba(0,80,140,.18) 0%,transparent 60%),
             radial-gradient(ellipse 60% 80% at 85% 75%,rgba(0,180,80,.08) 0%,transparent 55%)}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}

/* NAV */
nav{position:sticky;top:0;z-index:200;height:64px;
  background:rgba(2,6,10,.95);backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;
  box-shadow:0 1px 40px rgba(0,212,255,.06)}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--plasma) 30%,var(--volt) 70%,transparent);
  animation:navline 4s ease-in-out infinite;opacity:.5}
@keyframes navline{0%,100%{opacity:.3}50%{opacity:.7}}

.nav-brand{font-family:'Orbitron',monospace;font-size:1.25rem;font-weight:900;color:var(--plasma);
  text-decoration:none;letter-spacing:2px;text-shadow:0 0 20px rgba(0,212,255,.5);display:flex;align-items:center;gap:.7rem}
.nav-brand .bolt{width:26px;height:26px;background:linear-gradient(135deg,var(--plasma),var(--volt));
  clip-path:polygon(60% 0%,38% 45%,62% 45%,32% 100%,56% 55%,32% 55%);
  filter:drop-shadow(0 0 10px rgba(0,212,255,.9));animation:boltpulse 2s ease-in-out infinite}
@keyframes boltpulse{0%,100%{filter:drop-shadow(0 0 8px rgba(0,212,255,.8))}50%{filter:drop-shadow(0 0 16px rgba(57,255,110,1))}}
.nav-brand em{color:var(--volt);font-style:normal}

.nav-links{display:flex;align-items:center;gap:.2rem}
.nav-links a{color:var(--text-dim);text-decoration:none;padding:.4rem .85rem;border-radius:7px;
  font-size:.8rem;font-weight:500;letter-spacing:.3px;transition:all .25s}
.nav-links a:hover{color:var(--text);background:rgba(0,212,255,.07)}
.nav-links a.active{color:var(--plasma);background:rgba(0,212,255,.08)}
.user-chip{background:rgba(0,212,255,.07);border:1px solid var(--border);border-radius:20px;
  padding:.3rem .9rem;font-size:.72rem;color:var(--plasma);letter-spacing:.3px;display:flex;align-items:center;gap:.4rem}
.user-chip::before{content:'●';font-size:.45rem;color:var(--volt);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.nav-logout{color:var(--danger)!important;border:1px solid rgba(255,45,85,.2)!important}
.nav-logout:hover{background:rgba(255,45,85,.1)!important}

.page{position:relative;z-index:10}
.container{max-width:1240px;margin:0 auto;padding:2.5rem 2rem}
.page-header{margin-bottom:2.5rem}
.page-header h1{font-family:'Orbitron',monospace;font-size:1.75rem;font-weight:700;
  background:linear-gradient(90deg,var(--text) 0%,var(--plasma) 55%,var(--volt) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.page-header p{color:var(--text-dim);font-size:.87rem;margin-top:.4rem}

/* CARDS */
.card{background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--border);
  border-radius:var(--r);padding:1.5rem;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,.03),transparent 50%);pointer-events:none}
.card:hover{border-color:rgba(0,212,255,.25);box-shadow:0 4px 30px rgba(0,212,255,.08)}
.card-grid{display:grid;gap:1.25rem;grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}

/* STAT CARDS */
.stat-card{background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--border);
  border-radius:var(--r);padding:1.4rem 1.6rem;display:flex;align-items:center;gap:1.2rem;
  position:relative;overflow:hidden;transition:all .35s}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(0,212,255,.3);box-shadow:0 8px 30px rgba(0,212,255,.1)}
.stat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.stat-val{font-family:'Orbitron',monospace;font-size:2rem;font-weight:700;line-height:1}
.stat-lbl{font-size:.7rem;color:var(--text-dim);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

/* STATION CARD */
.station-card{background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--border);
  border-radius:var(--r);padding:1.4rem;position:relative;overflow:hidden;transition:all .35s}
.station-card:hover{border-color:rgba(0,212,255,.4);box-shadow:0 0 40px rgba(0,212,255,.1);transform:translateY(-4px)}
.station-card h3{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:600;color:var(--text);letter-spacing:.5px;line-height:1.4;margin-bottom:.5rem}
.station-meta{font-size:.77rem;color:var(--text-dim);margin-bottom:.3rem}
.slot-display{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:.9rem 0}
.slot-box{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:.65rem;text-align:center}
.slot-num{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:700;line-height:1}
.slot-sub{font-size:.62rem;color:var(--text-ghost);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.cap-bar{height:4px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin:.6rem 0}
.cap-fill{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.cap-fill.full{background:linear-gradient(90deg,#00cc44,#39ff6e);box-shadow:0 0 8px rgba(57,255,110,.5)}
.cap-fill.mid{background:linear-gradient(90deg,#cc7700,#ffaa00);box-shadow:0 0 8px rgba(255,150,0,.5)}
.cap-fill.low{background:linear-gradient(90deg,#cc2200,#ff4422);box-shadow:0 0 8px rgba(255,60,30,.5)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:20px;
  font-size:.65rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.badge-active{background:rgba(57,255,110,.1);color:var(--volt);border:1px solid rgba(57,255,110,.3)}
.badge-active::before{content:'●';font-size:.45rem;animation:blink 1.5s infinite}
.badge-maint{background:rgba(255,107,26,.1);color:var(--ember);border:1px solid rgba(255,107,26,.3)}
.badge-confirm{background:rgba(0,212,255,.1);color:var(--plasma);border:1px solid rgba(0,212,255,.3)}
.badge-cancel{background:rgba(255,45,85,.1);color:var(--danger);border:1px solid rgba(255,45,85,.3)}
.badge-info{background:rgba(0,212,255,.06);color:var(--text-dim);border:1px solid var(--border)}
.badge-gold{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.badge-paid{background:rgba(57,255,110,.1);color:var(--volt);border:1px solid rgba(57,255,110,.3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.6rem 1.4rem;border-radius:8px;font-family:'Exo 2',sans-serif;font-size:.85rem;
  font-weight:600;letter-spacing:.5px;text-decoration:none;border:none;cursor:pointer;
  transition:all .25s;position:relative;overflow:hidden}
.btn-plasma{background:linear-gradient(135deg,rgba(0,140,175,.85),rgba(0,100,140,.7));color:var(--plasma);
  border:1px solid rgba(0,212,255,.4);box-shadow:0 0 20px rgba(0,212,255,.15)}
.btn-plasma:hover{box-shadow:0 0 30px rgba(0,212,255,.4);transform:translateY(-2px);border-color:var(--plasma)}
.btn-volt{background:linear-gradient(135deg,rgba(0,110,40,.85),rgba(0,80,30,.7));color:var(--volt);
  border:1px solid rgba(57,255,110,.4);box-shadow:0 0 20px rgba(57,255,110,.15)}
.btn-volt:hover{box-shadow:0 0 30px rgba(57,255,110,.4);transform:translateY(-2px);border-color:var(--volt)}
.btn-gold{background:linear-gradient(135deg,rgba(120,90,0,.85),rgba(80,60,0,.7));color:var(--gold);
  border:1px solid rgba(255,215,0,.4);box-shadow:0 0 20px rgba(255,215,0,.15)}
.btn-gold:hover{box-shadow:0 0 30px rgba(255,215,0,.4);transform:translateY(-2px)}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{border-color:rgba(0,212,255,.3);color:var(--text);background:rgba(0,212,255,.06)}
.btn-danger{background:rgba(255,45,85,.08);color:var(--danger);border:1px solid rgba(255,45,85,.25)}
.btn-danger:hover{background:rgba(255,45,85,.18);box-shadow:0 0 15px rgba(255,45,85,.25)}
.btn-sm{padding:.35rem .85rem;font-size:.77rem}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}

/* FORMS */
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.68rem;color:var(--text-dim);margin-bottom:.45rem;font-weight:600;text-transform:uppercase;letter-spacing:1.2px}
.form-group input,.form-group select{width:100%;background:rgba(0,0,0,.35);backdrop-filter:blur(10px);
  border:1px solid var(--border);color:var(--text);padding:.7rem 1rem;border-radius:8px;
  font-size:.88rem;font-family:'Exo 2',sans-serif;transition:all .25s;-webkit-appearance:none}
.form-group input::placeholder{color:var(--text-ghost)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--plasma);
  box-shadow:0 0 0 3px rgba(0,212,255,.12),0 0 20px rgba(0,212,255,.06);background:rgba(0,20,40,.6)}
.form-group select option{background:#060d14}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:.83rem}
.data-table thead th{text-align:left;padding:.8rem 1.1rem;color:var(--text-ghost);font-size:.65rem;
  font-weight:700;text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border)}
.data-table tbody tr{border-bottom:1px solid rgba(0,212,255,.04);transition:background .2s}
.data-table tbody tr:hover{background:rgba(0,212,255,.025)}
.data-table tbody tr:last-child{border-bottom:none}
.data-table tbody td{padding:.85rem 1.1rem;vertical-align:middle}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.75rem;overflow-x:auto}
.tab{padding:.8rem 1.3rem;font-size:.78rem;font-weight:600;color:var(--text-ghost);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .25s;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
.tab:hover{color:var(--text-dim)}
.tab.active{color:var(--plasma);border-bottom-color:var(--plasma);text-shadow:0 0 12px rgba(0,212,255,.5)}

.section-title{font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;color:var(--text-dim);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem}
.section-title::before{content:'';display:block;width:3px;height:16px;background:linear-gradient(180deg,var(--plasma),var(--volt));border-radius:2px}

.alert{padding:.85rem 1.1rem;border-radius:8px;font-size:.84rem;margin-bottom:1rem}
.alert-error{background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.3);color:#ff6b88}
.alert-success{background:rgba(57,255,110,.08);border:1px solid rgba(57,255,110,.3);color:var(--volt)}

.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border-h),transparent);margin:1.5rem 0}
.flex{display:flex;align-items:center}
.gap-1{gap:.5rem}.gap-2{gap:1rem}
.justify-between{justify-content:space-between}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}
.text-dim{color:var(--text-dim)}.text-sm{font-size:.8rem}.text-xs{font-size:.72rem}
@keyframes fadein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.form-row,.form-row-3{grid-template-columns:1fr}.container{padding:1.5rem 1rem}.nav-links a:not(.user-chip):not(.nav-logout):not(.active){display:none}}
</style>
</head>
<body>
<div class="scanlines"></div>
{% if session.user_id %}
<nav>
  <a href="{{ url_for('dashboard') }}" class="nav-brand">
    <span class="bolt"></span>Charge<em>Pro</em>
  </a>
  <div class="nav-links">
    {% if session.role == 'admin' %}
      <a href="{{ url_for('admin_panel') }}" {% if request.endpoint=='admin_panel' %}class="active"{% endif %}>Admin</a>
    {% else %}
      <a href="{{ url_for('dashboard') }}" {% if request.endpoint=='dashboard' %}class="active"{% endif %}>Dashboard</a>
      <a href="{{ url_for('my_vehicles') }}" {% if request.endpoint=='my_vehicles' %}class="active"{% endif %}>Vehicles</a>
      <a href="{{ url_for('my_sessions') }}" {% if request.endpoint=='my_sessions' %}class="active"{% endif %}>Sessions</a>
      <a href="{{ url_for('payments') }}" {% if request.endpoint=='payments' %}class="active"{% endif %}>Payments</a>
      <a href="{{ url_for('status') }}" {% if request.endpoint=='status' %}class="active"{% endif %}>Live Status</a>
    {% endif %}
    <span class="user-chip">{{ session.user_name }}</span>
    <a href="{{ url_for('logout') }}" class="nav-logout" style="color:var(--danger);text-decoration:none;padding:.4rem .85rem;border-radius:7px;font-size:.8rem;font-weight:500;border:1px solid rgba(255,45,85,.2);transition:all .25s">Logout</a>
  </div>
</nav>
{% endif %}
<div class="page">{% block content %}{% endblock %}</div>
{% block scripts %}{% endblock %}
</body>
</html>
